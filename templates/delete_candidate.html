{% extends 'base.html' %}

{% block title %}Delete Candidate{% endblock %}

{% block content %}
<h2>Delete Candidate</h2>
<p>Are you sure you want to delete the candidate '{{ candidate[2] }}'?</p>
<form method="POST" action="{{ url_for('delete_candidate', candidate_id=candidate[0]) }}">
  <button type="submit" class="btn btn-danger">Delete</button>
  <a href="{{ url_for('view_candidates') }}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
