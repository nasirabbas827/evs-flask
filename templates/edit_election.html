{% extends 'base.html' %}

{% block title %}Edit Election{% endblock %}

{% block content %}
<h2>Edit Election</h2>
<form method="POST" action="{{ url_for('edit_election', election_id=election[0]) }}">
  <div class="form-group">
    <label for="election_name">Election Name</label>
    <input type="text" class="form-control" id="election_name" name="election_name" value="{{ election[1] }}" required>
  </div>
  <div class="form-group">
    <label for="start_date">Start Date</label>
    <input type="date" class="form-control" id="start_date" name="start_date" value="{{ election[3] }}" required>
  </div>
  <div class="form-group">
    <label for="end_date">End Date</label>
    <input type="date" class="form-control" id="end_date" name="end_date" value="{{ election[4] }}" required>
  </div>
  <div class="form-group">
    <label for="status">Status</label>
    <select class="form-control" id="status" name="status">
      <option value="pending" {% if election[2] == 'pending' %} selected {% endif %}>Pending</option>
      <option value="ongoing" {% if election[2] == 'ongoing' %} selected {% endif %}>Ongoing</option>
      <option value="completed" {% if election[2] == 'completed' %} selected {% endif %}>Completed</option>
    </select>
  </div>
  <button type="submit" class="btn btn-primary">Save Changes</button>
</form>
{% endblock %}
