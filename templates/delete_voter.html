{% extends 'base.html' %}

{% block title %}Delete Voter{% endblock %}

{% block content %}
<h2>Delete Voter</h2>
<p>Are you sure you want to delete voter "{{ voter[1] }}" with username "{{ voter[2] }}"?</p>
<form method="POST" action="{{ url_for('delete_voter', voter_id=voter[0]) }}">
  <button type="submit" class="btn btn-danger">Delete</button>
  <a href="{{ url_for('view_voters') }}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
