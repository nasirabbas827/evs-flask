{% extends 'base.html' %}

{% block title %}View Voters{% endblock %}

{% block content %}
<h2>All Voters</h2>
<table class="table">
  <thead>
    <tr>
      <th>Voter ID</th>
      <th>Voter Name</th>
      <th>Username</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody>
    {% for voter in voters %}
    <tr>
      <td>{{ voter[0] }}</td>
      <td>{{ voter[1] }}</td>
      <td>{{ voter[2] }}</td>
      <td>
        <a href="{{ url_for('edit_voter', voter_id=voter[0]) }}" class="btn btn-primary">Edit</a>
        <a href="{{ url_for('delete_voter', voter_id=voter[0]) }}" class="btn btn-danger">Delete</a>
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
